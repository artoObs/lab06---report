name: CI

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            cxx: clang++
          - os: windows-latest
            compiler: msvc
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux compilers
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential clang
      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - name: Configure CMake (Unix)
        if: runner.os != 'Windows'
        run: cmake -S . -B _build -DCMAKE_INSTALL_PREFIX=_install -DCMAKE_C_COMPILER=${{ matrix.cc }} -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}
      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B _build -DCMAKE_INSTALL_PREFIX=_install
      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cmake --build _build
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build _build --config Release

  release-packages:
    name: Build packages on ${{ matrix.os }}
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            cpack_generator: "DEB;RPM"
          - os: windows-latest
            cpack_generator: "WIX"
          - os: macos-latest
            cpack_generator: "DragNDrop"
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux packaging tools (rpm)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Install WiX Toolset (Windows)
        if: runner.os == 'Windows'
        run: choco install wixtoolset

      - name: Configure CMake
        run: cmake -S . -B _build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build _build --config Release

      - name: Create packages with CPack
        shell: bash
        run: |
          cd _build
          IFS=';' read -ra GENERATORS <<< "${{ matrix.cpack_generator }}"
          for gen in "${GENERATORS[@]}"; do
            echo "=== Generating $gen ==="
            cpack -G "$gen"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.os }}
          path: _build/*.{deb,rpm,dmg,msi}

  create-release:
    needs: release-packages
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/packages-ubuntu-latest/*.deb
            artifacts/packages-ubuntu-latest/*.rpm
            artifacts/packages-macos-latest/*.dmg
            artifacts/packages-windows-latest/*.msi
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
